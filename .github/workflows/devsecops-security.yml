name: DevSecOps Security Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  dependency-audit:
    name: Dependency audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --json > npm-audit.json || true

      - name: Upload npm audit report
        uses: actions/upload-artifact@v4
        with:
          name: npm-audit-report
          path: npm-audit.json

  semgrep-sast:
    name: Semgrep SAST
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Semgrep
        run: |
          docker run --rm \
            -v "${PWD}:/src" \
            returntocorp/semgrep:latest \
            semgrep scan \
              --config=p/security-audit \
              --sarif \
              --output=/src/semgrep.sarif \
              --metrics=off || true

      - name: Upload Semgrep SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: semgrep.sarif

  trivy-filesystem:
    name: Trivy filesystem scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-fs.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-fs.sarif

  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          config-path: .gitleaks.toml
          args: >
            detect
            --verbose
            --redact
            --source=.

  security-gateway:
    name: Security Gateway
    runs-on: ubuntu-latest
    needs:
      - dependency-audit
      - semgrep-sast
      - trivy-filesystem
      - secret-scan
    if: always()

    steps:
      - name: Check security jobs status
        run: |
          echo "dependency-audit: ${{ needs.dependency-audit.result }}"
          echo "semgrep-sast: ${{ needs.semgrep-sast.result }}"
          echo "trivy-filesystem: ${{ needs.trivy-filesystem.result }}"
          echo "secret-scan: ${{ needs.secret-scan.result }}"

          if [ "${{ needs.secret-scan.result }}" != "success" ]; then
            echo "Security Gateway failed: secrets were detected or secret scan failed."
            exit 1
          fi

          if [ "${{ needs.semgrep-sast.result }}" != "success" ]; then
            echo "Security Gateway failed: SAST scan failed."
            exit 1
          fi

          if [ "${{ needs.trivy-filesystem.result }}" != "success" ]; then
            echo "Security Gateway failed: Trivy scan failed."
            exit 1
          fi

          echo "Security Gateway passed."
